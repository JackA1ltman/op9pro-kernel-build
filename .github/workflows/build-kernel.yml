name: Build OnePlus 9 Pro Stock-Equivalent Kernel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEFCONFIG: ossi_oos14_defconfig
  DEVICE_CODENAME: lemonadep
  KERNEL_IMAGE: Image

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      # 1) Checkout sources
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel/msm-5.4
          fetch-depth: 1

      - name: Checkout device tree & modules
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVICE_TREE_REPO }}
          ref: ${{ env.DEVICE_TREE_BRANCH }}
          path: kernel_modules_devicetree
          fetch-depth: 1

      # 2) Install host deps (dos2unix included)
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex git \
            gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev libelf-dev \
            liblz4-tool libncurses5-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            cpio dos2unix rsync

      # 3) Clone toolchains & AOSP build helper
      - name: Clone Toolchains & build helper
        run: |
          set -e
          echo "==> Cloning AOSP Clang 11.0.2..."
          rm -rf $GITHUB_WORKSPACE/toolchain/clang || true
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android11-release --depth=1 $GITHUB_WORKSPACE/toolchain/clang
          echo "==> Cloning GCC aarch64..."
          rm -rf $GITHUB_WORKSPACE/toolchain/gcc-aarch64 || true
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git $GITHUB_WORKSPACE/toolchain/gcc-aarch64
          echo "==> Cloning GCC arm32..."
          rm -rf $GITHUB_WORKSPACE/toolchain/gcc-arm32 || true
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git $GITHUB_WORKSPACE/toolchain/gcc-arm32
          echo "==> Cloning AOSP build scripts..."
          rm -rf $GITHUB_WORKSPACE/build || true
          git clone https://android.googlesource.com/kernel/build --depth=1 $GITHUB_WORKSPACE/build

      # 4) Construct AOSP layout, techpack stubs (only if missing), and normalize line endings
      - name: Prepare workspace and techpack stubs
        run: |
          set -e
          echo "==> Sync device/ and vendor/ from devicetree"
          mkdir -p $GITHUB_WORKSPACE/device
          mkdir -p $GITHUB_WORKSPACE/vendor
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/device/ $GITHUB_WORKSPACE/device/ || true
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/vendor/ $GITHUB_WORKSPACE/vendor/ || true

          # If kernel techpack dirs are missing, create minimal stub Makefiles so 'make clean' and Kbuild traversal succeed
          for subdir in audio camera display video dataipa; do
            dst="$GITHUB_WORKSPACE/kernel/msm-5.4/techpack/$subdir"
            if [ ! -d "$dst" ]; then
              mkdir -p "$dst"
            fi
            # Ensure a safe stub Makefile exists with minimal content to avoid "No rule to make target" errors
            mk="$dst/Makefile"
            if [ ! -f "$mk" ]; then
              echo "# Stub Makefile - no inline techpack sources. Prevent make errors." > "$mk"
              echo "obj-y :=" >> "$mk"
            fi
            # Ensure Kconfig exists
            kcfg="$dst/Kconfig"
            if [ ! -f "$kcfg" ]; then
              touch "$kcfg"
            fi
          done

          # Remove the cloned devicetree repo to save space (we copied what we needed)
          rm -rf $GITHUB_WORKSPACE/kernel_modules_devicetree || true

          # create expected link for build wrapper
          ln -sfn $GITHUB_WORKSPACE/device/qcom/kernelscripts/upstream/build.config.common $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.common || true

          # Normalize line endings for Kconfig and other potential text files that cause "ignoring unsupported character" warnings
          echo "==> Normalizing text files under kernel tree..."
          find $GITHUB_WORKSPACE/kernel/msm-5.4 -type f -name 'Kconfig' -exec dos2unix {} \; || true
          # extra normalization in known problematic area (Oplus)
          if [ -d "$GITHUB_WORKSPACE/kernel/msm-5.4/drivers/soc/oplus" ]; then
            find $GITHUB_WORKSPACE/kernel/msm-5.4/drivers/soc/oplus -type f -exec dos2unix {} \; || true
            find $GITHUB_WORKSPACE/kernel/msm-5.4/drivers/soc/oplus -type f -exec sed -i 's/\r$//' {} \; || true
          fi

      # 4.5) Allocate swap to avoid OOM during LTO/link
      - name: Allocate Swap Space
        run: |
          sudo fallocate -l 10G /swapfile2 || sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h

      # 5) Prepare build config and run Qualcomm wrapper (minimally intrusive)
      - name: Generate Proxy Config & Build (Qualcomm wrapper)
        env:
          ROOT_DIR: ${{ github.workspace }}
        run: |
          set -e
          cd $GITHUB_WORKSPACE

          # set toolchain paths
          CLANG_DIR="$GITHUB_WORKSPACE/toolchain/clang/clang-r383902b"
          GCC64_DIR="$GITHUB_WORKSPACE/toolchain/gcc-aarch64"
          GCC32_DIR="$GITHUB_WORKSPACE/toolchain/gcc-arm32"
          export PATH="$CLANG_DIR/bin:$GCC64_DIR/bin:$GCC32_DIR/bin:$PATH"

          # Do NOT force VARIANTS to qgki-consolidate. Let OEM wrapper select appropriate variant for lahaina.
          echo "==> Keeping OEM VARIANTS behavior (do not force qgki-consolidate)."

          # Best-effort: set LOCALVERSION string in fragments to stock vermagic - harmless if absent
          CONFIGS_DIR="$GITHUB_WORKSPACE/kernel/msm-5.4/arch/arm64/configs"
          if [ -d "$CONFIGS_DIR" ]; then
            find "$CONFIGS_DIR" -type f \( -name "*.config" -o -name "*defconfig" \) -exec sed -i 's/CONFIG_LOCALVERSION="[^"]*"/CONFIG_LOCALVERSION="-qgki-gd2a1055adeb0"/g' {} || true \;
            echo "Patched LOCALVERSION in config fragments (best-effort)."
          fi

          # Build proxy to append fix_localversion after defconfig if wrapper supports it
          cat << 'EOF' > build.config.custom
          function append_cmd() {
              if [ ! -z "${!1}" ]; then
                  eval "$1=\"${!1} && \$2\""
              else
                  eval "$1=\"\$2\""
              fi
          }
          export -f append_cmd

          . ${ROOT_DIR}/kernel/msm-5.4/build.config.msm.lahaina

          function fix_localversion() {
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config \
                --set-str LOCALVERSION "-qgki-gd2a1055adeb0"
              (cd ${KERNEL_DIR} && make "${TOOL_ARGS[@]}" O=${OUT_DIR} ${MAKE_ARGS} olddefconfig)
          }
          append_cmd POST_DEFCONFIG_CMDS 'fix_localversion'
          EOF

          # Ensure the OEM wrapper finds _setup_env.sh where it expects it (fallback copies)
          mkdir -p $GITHUB_WORKSPACE/device/qcom/build
          if [ -f "$GITHUB_WORKSPACE/device/qcom/kernelscripts/_setup_env.sh" ]; then
            cp "$GITHUB_WORKSPACE/device/qcom/kernelscripts/_setup_env.sh" "$GITHUB_WORKSPACE/device/qcom/build/_setup_env.sh" || true
            echo "Copied _setup_env.sh from device/qcom/kernelscripts"
          elif [ -f "$GITHUB_WORKSPACE/kernel/msm-5.4/device/qcom/kernelscripts/_setup_env.sh" ]; then
            cp "$GITHUB_WORKSPACE/kernel/msm-5.4/device/qcom/kernelscripts/_setup_env.sh" "$GITHUB_WORKSPACE/device/qcom/build/_setup_env.sh" || true
            echo "Copied _setup_env.sh from kernel tree fallback"
          else
            echo "WARNING: _setup_env.sh not found in expected locations. build.sh may still fail."
          fi

          export BUILD_CONFIG=build.config.custom
          export KERNEL_DIR=kernel/msm-5.4

          # Toolchain vars
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1

          # Do NOT remove .git or force '-dirty' neutralization here — keep build metadata intact to avoid mismatches.
          # Execute Official OEM wrapper (this script will pick the correct variant & generate defconfig)
          echo "============================================"
          echo "  Executing Official QCOM Build Wrapper"
          echo "============================================"
          bash device/qcom/kernelscripts/build.sh LLVM=1 LLVM_IAS=1 || ( echo "build.sh failed — check logs above" ; exit 1 )

      # 6) Collect and verify produced Image and vermagic
      - name: Collect Image and verify vermagic
        run: |
          set -e
          echo "==> Searching for produced Image under out/ ..."
          find $GITHUB_WORKSPACE/out -maxdepth 4 -type f -name Image -print || true

          RAW_IMAGE=""
          # prefer lahaina+qgki dirs
          for d in $(ls -1d $GITHUB_WORKSPACE/out/* 2>/dev/null || true); do
            base=$(basename "$d")
            if echo "$base" | grep -qi "lahaina" && echo "$base" | grep -qi "qgki"; then
              cand="$d/dist/Image"
              if [ -f "$cand" ]; then
                RAW_IMAGE="$cand"
                break
              fi
              # some builds put Image under arch/arm64/boot
              cand2="$d/arch/arm64/boot/Image"
              if [ -f "$cand2" ]; then
                RAW_IMAGE="$cand2"
                break
              fi
            fi
          done

          # fallback common locations
          if [ -z "$RAW_IMAGE" ]; then
            if [ -f "$GITHUB_WORKSPACE/out/msm-5.4-lahaina-qgki-consolidate/dist/Image" ]; then
              RAW_IMAGE="$GITHUB_WORKSPACE/out/msm-5.4-lahaina-qgki-consolidate/dist/Image"
            elif [ -f "$GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/Image" ]; then
              RAW_IMAGE="$GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/Image"
            elif [ -f "$GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/Image.gz-dtb" ]; then
              RAW_IMAGE="$GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/Image.gz-dtb"
            fi
          fi

          if [ -z "$RAW_IMAGE" ] || [ ! -f "$RAW_IMAGE" ]; then
            echo "ERROR: Kernel Image not found. Listing out/ tree for debugging:"
            find $GITHUB_WORKSPACE/out -maxdepth 5 -type f -name Image -or -name 'Image.gz-dtb' -print || true
            exit 1
          fi

          echo "==> Found Kernel Image: $RAW_IMAGE"
          echo "=== vermagic snippet from Image ==="
          if command -v strings >/dev/null 2>&1; then
            strings "$RAW_IMAGE" | egrep -i "vermagic|clang|qgki|-qgki" || true
          fi
          echo "=== end vermagic snippet ==="

          # export path for packaging step
          echo "RAW_IMAGE=$RAW_IMAGE" >> $GITHUB_ENV

      # 7) Package AnyKernel zip (use user's anykernel.sh if present)
      - name: Package kernel into flashable ZIP
        run: |
          set -e
          RAW_IMAGE="${{ env.RAW_IMAGE }}"
          if [ -z "$RAW_IMAGE" ] || [ ! -f "$RAW_IMAGE" ]; then
            echo "ERROR: RAW_IMAGE not set or missing: $RAW_IMAGE"
            exit 1
          fi

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          rm -rf modules patch ramdisk || true
          rm -f README.md || true
          if [ -f "$GITHUB_WORKSPACE/anykernel/anykernel.sh" ]; then
            cp "$GITHUB_WORKSPACE/anykernel/anykernel.sh" ./anykernel.sh
          fi
          cp "$RAW_IMAGE" ./${{ env.KERNEL_IMAGE }}
          DATESTAMP=$(date +%Y%m%d-%H%M)
          ZIP_NAME="StockEquiv-OP9Pro-${DATESTAMP}.zip"
          zip -r9 "$GITHUB_WORKSPACE/${ZIP_NAME}" . -x '.git/*' -x '*.zip' || true
          echo "==> Created: ${ZIP_NAME}"
          ls -lh "$GITHUB_WORKSPACE/${ZIP_NAME}" || true

      # 8) Upload artifact
      - name: Upload kernel ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockEquiv-OP9Pro-kernel
          path: StockEquiv-OP9Pro-*.zip
          retention-days: 30
          if-no-files-found: error
