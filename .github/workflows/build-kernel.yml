name: Build OnePlus 9 Pro Stock-Equivalent Kernel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEFCONFIG: ossi_oos14_defconfig
  DEVICE_CODENAME: lemonadep
  KERNEL_IMAGE: Image

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT SOURCES
      # ─────────────────────────────────────────────
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel_source
          fetch-depth: 1

      - name: Checkout device tree & modules
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVICE_TREE_REPO }}
          ref: ${{ env.DEVICE_TREE_BRANCH }}
          path: kernel_modules_devicetree
          fetch-depth: 1

      # ─────────────────────────────────────────────
      # 2. INSTALL HOST DEPENDENCIES
      # ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            git gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev libelf-dev \
            liblz4-tool libncurses5-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            cpio

      # ─────────────────────────────────────────────
      # 3. TOOLCHAIN — AOSP Clang 11 (r383902b1)
      #    Matches stock: "clang version 11.0.2"
      #    Build ID: 6877366 based on r383902b1
      #
      #    IMPORTANT: clang-r383902b1 only exists on
      #    android11-qpr3-release branch, NOT android11-release.
      #    Using sparse-checkout to fetch only that directory.
      # ─────────────────────────────────────────────
      - name: Fetch AOSP Clang 11 (r383902b1) via sparse-checkout
        run: |
          echo "==> Fetching AOSP Clang 11.0.2 (r383902b1) from android11-qpr3-release..."
          CLANG_BASE="$GITHUB_WORKSPACE/toolchain/clang"
          mkdir -p "$CLANG_BASE"
          cd "$CLANG_BASE"

          git init
          git remote add origin https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86

          # Enable sparse-checkout — fetch ONLY clang-r383902b1/
          git sparse-checkout init --no-cone
          git sparse-checkout set "clang-r383902b1"

          # Shallow fetch from android11-qpr3-release (the branch that has b1)
          git fetch --depth=1 origin android11-qpr3-release
          git checkout FETCH_HEAD

          echo "==> Sparse-checkout complete."

      - name: Verify Clang toolchain
        run: |
          CLANG_BIN="$GITHUB_WORKSPACE/toolchain/clang/clang-r383902b1/bin/clang"
          echo "==> Verifying clang binary..."

          if [ ! -f "$CLANG_BIN" ]; then
            echo "ERROR: clang binary not found at expected path!"
            echo "==> Directory listing of toolchain/clang/:"
            ls -la $GITHUB_WORKSPACE/toolchain/clang/ || true
            echo "==> Searching for any clang binary:"
            find $GITHUB_WORKSPACE/toolchain/clang -maxdepth 5 -name "clang" -type f 2>/dev/null | head -10
            exit 1
          fi

          file "$CLANG_BIN"
          "$CLANG_BIN" --version
          echo "==> Clang toolchain verified successfully!"

      - name: Clone GCC aarch64 cross-compiler from LineageOS mirror
        run: |
          echo "==> Cloning GCC 4.9 aarch64 cross-compiler..."
          git clone --depth=1 -b lineage-19.1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc-aarch64

      - name: Clone GCC arm32 cross-compiler (for compat vDSO)
        run: |
          echo "==> Cloning GCC 4.9 arm32 cross-compiler..."
          git clone --depth=1 -b lineage-19.1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc-arm32

      # ─────────────────────────────────────────────
      # 4. RESOLVE OPLUS VENDOR SYMLINKS
      #    The kernel source has symlinks to vendor paths
      #    using relative ../../../vendor/oplus/... references.
      #
      #    Strategy: Create the vendor directory structure at
      #    the correct filesystem location so symlinks resolve
      #    naturally. Symlinks go N levels of ../ from within the
      #    kernel tree, so we place vendor/* at the right spot.
      #
      #    Then fix any remaining broken symlinks by reading
      #    their targets and looking up in the device tree.
      # ─────────────────────────────────────────────
      - name: Resolve OPlus vendor symlinks
        run: |
          KERNEL_SRC="$GITHUB_WORKSPACE/kernel_source"
          DT_SRC="$GITHUB_WORKSPACE/kernel_modules_devicetree"

          echo "==> Phase 1: Create vendor directory at all levels symlinks may reference..."

          # Symlinks use relative ../ paths. Different depths in the tree
          # resolve to different filesystem locations. We create symlinks from
          # vendor/oplus at each possible parent level that symlinks might
          # reference, pointing to the actual content in the DT repo.

          # The kernel source is at $GITHUB_WORKSPACE/kernel_source/
          # Symlinks from kernel_source/kernel/<name> with ../../../vendor/...
          #   resolve to: $GITHUB_WORKSPACE/vendor/...
          # Symlinks from kernel_source/fs/<name> with ../../../vendor/...
          #   resolve to: $GITHUB_WORKSPACE/vendor/...
          # Symlinks from kernel_source/drivers/power/<name> with ../../../../vendor/...
          #   resolve to: $GITHUB_WORKSPACE/vendor/...
          # Most paths resolve to $GITHUB_WORKSPACE/vendor or parents.

          # Create "vendor" symlink at $GITHUB_WORKSPACE level
          if [ -d "$DT_SRC/vendor" ]; then
            echo "  Creating vendor link at GITHUB_WORKSPACE level..."
            ln -sfn "$DT_SRC/vendor" "$GITHUB_WORKSPACE/vendor"
          fi

          # Some symlinks from deeper dirs (4+ levels) resolve above $GITHUB_WORKSPACE
          # We also create links at parent levels
          WORKSPACE_PARENT=$(dirname "$GITHUB_WORKSPACE")
          WORKSPACE_GRANDPARENT=$(dirname "$WORKSPACE_PARENT")

          if [ -d "$DT_SRC/vendor" ]; then
            echo "  Creating vendor link at GITHUB_WORKSPACE parent..."
            ln -sfn "$DT_SRC/vendor" "$WORKSPACE_PARENT/vendor" 2>/dev/null || true
            echo "  Creating vendor link at GITHUB_WORKSPACE grandparent..."
            ln -sfn "$DT_SRC/vendor" "$WORKSPACE_GRANDPARENT/vendor" 2>/dev/null || true
          fi

          # Also handle kernel_source-level symlinks (1-2 levels of ../)
          if [ -d "$DT_SRC/vendor" ]; then
            echo "  Creating vendor link inside kernel_source..."
            ln -sfn "$DT_SRC/vendor" "$KERNEL_SRC/vendor" 2>/dev/null || true
            # One level up from kernel_source
            ln -sfn "$DT_SRC/vendor" "$(dirname "$KERNEL_SRC")/vendor" 2>/dev/null || true
          fi

          echo "==> Phase 2: Verify and fix any remaining broken symlinks..."
          broken_links=$(find "$KERNEL_SRC" -type l ! -exec test -e {} \; -print 2>/dev/null || true)

          if [ -z "$broken_links" ]; then
            echo "  All symlinks resolved!"
          else
            echo "  Remaining broken symlinks:"
            resolved=0
            removed=0

            for link in $broken_links; do
              target=$(readlink "$link")
              # Try to resolve the symlink relative to its location
              link_dir=$(dirname "$link")
              resolved_path=$(cd "$link_dir" 2>/dev/null && realpath -m "$target" 2>/dev/null || echo "")

              echo "    Broken: $link -> $target"
              if [ -n "$resolved_path" ]; then
                echo "      Would resolve to: $resolved_path"
              fi

              # Strip all leading ../ and try to find in device tree
              vendor_rel=$(echo "$target" | sed 's|\(\.\./\)*||')
              if [ -d "$DT_SRC/$vendor_rel" ]; then
                echo "      ==> Found in DT, copying..."
                rm -f "$link"
                cp -r "$DT_SRC/$vendor_rel" "$link"
                resolved=$((resolved + 1))
              elif [ -f "$DT_SRC/$vendor_rel" ]; then
                echo "      ==> Found file in DT, copying..."
                rm -f "$link"
                cp "$DT_SRC/$vendor_rel" "$link"
                resolved=$((resolved + 1))
              else
                echo "      WARNING: Not resolvable, removing."
                rm -f "$link"
                removed=$((removed + 1))
              fi
            done

            echo "  Phase 2 complete: $resolved resolved, $removed removed."
          fi

          echo "==> Final verification: checking for any remaining broken symlinks..."
          final_broken=$(find "$KERNEL_SRC" -type l ! -exec test -e {} \; -print 2>/dev/null || true)
          if [ -n "$final_broken" ]; then
            echo "  WARNING: Still broken symlinks remaining:"
            echo "$final_broken"
          else
            echo "  SUCCESS: No broken symlinks remain."
          fi

      # ─────────────────────────────────────────────
      # 5. PREPARE DEFCONFIG
      #    Copy extracted stock config into kernel tree
      # ─────────────────────────────────────────────
      - name: Place stock defconfig
        run: |
          cp $GITHUB_WORKSPACE/defconfig/${{ env.DEFCONFIG }} \
             $GITHUB_WORKSPACE/kernel_source/arch/arm64/configs/${{ env.DEFCONFIG }}
          echo "==> Defconfig placed at arch/arm64/configs/${{ env.DEFCONFIG }}"

      # ─────────────────────────────────────────────
      # 6. BUILD KERNEL
      # ─────────────────────────────────────────────
      - name: Set up environment & build
        run: |
          # ── Toolchain paths ──
          CLANG_DIR="$GITHUB_WORKSPACE/toolchain/clang/clang-r383902b1"
          GCC64_DIR="$GITHUB_WORKSPACE/toolchain/gcc-aarch64"
          GCC32_DIR="$GITHUB_WORKSPACE/toolchain/gcc-arm32"

          export PATH="$CLANG_DIR/bin:$GCC64_DIR/bin:$GCC32_DIR/bin:$PATH"

          # ── Build variables (match stock exactly) ──
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_COMPAT=arm-linux-androideabi-

          # Make arguments for full LLVM/Clang build
          MAKE_ARGS=(
            ARCH=arm64
            SUBARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_COMPAT=arm-linux-androideabi-
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            LLVM=1
            LLVM_IAS=1
            O=out
          )

          cd $GITHUB_WORKSPACE/kernel_source

          echo "============================================"
          echo "  Step 1: Generate .config from stock defconfig"
          echo "============================================"
          make "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG }}

          echo "============================================"
          echo "  Step 2: CRITICAL — Disable LOCALVERSION_AUTO"
          echo "  This prevents git hash from being appended"
          echo "  to the kernel release string, which would"
          echo "  break vermagic and cause module load failures."
          echo "============================================"
          scripts/config --file out/.config \
            --disable LOCALVERSION_AUTO

          # Ensure LOCALVERSION stays exactly "-qgki"
          scripts/config --file out/.config \
            --set-str LOCALVERSION "-qgki"

          # Regenerate config with overrides applied
          make "${MAKE_ARGS[@]}" olddefconfig

          # Verify critical settings
          echo "==> Verifying critical config values:"
          grep -E "CONFIG_LOCALVERSION=|CONFIG_LOCALVERSION_AUTO=|CONFIG_MODVERSIONS=|CONFIG_MODULE_SIG" out/.config || true

          echo "============================================"
          echo "  Step 3: Build kernel (${{ env.KERNEL_IMAGE }})"
          echo "============================================"
          make "${MAKE_ARGS[@]}" -j$(nproc --all) ${{ env.KERNEL_IMAGE }}

          echo "============================================"
          echo "  Build complete!"
          echo "============================================"
          ls -la out/arch/arm64/boot/${{ env.KERNEL_IMAGE }}

      # ─────────────────────────────────────────────
      # 7. ANYKERNEL3 PACKAGING
      # ─────────────────────────────────────────────
      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3

      - name: Package kernel into flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3

          # Remove example files
          rm -rf modules patch ramdisk
          rm -f README.md

          # Copy our device-specific anykernel.sh
          cp $GITHUB_WORKSPACE/anykernel/anykernel.sh ./anykernel.sh

          # Copy the compiled kernel image
          cp $GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/${{ env.KERNEL_IMAGE }} ./${{ env.KERNEL_IMAGE }}

          # Create the flashable ZIP
          DATESTAMP=$(date +%Y%m%d-%H%M)
          ZIP_NAME="StockEquiv-OP9Pro-${DATESTAMP}.zip"
          zip -r9 "$GITHUB_WORKSPACE/${ZIP_NAME}" \
            . \
            -x '.git/*' \
            -x '*.zip'

          echo "==> Created: ${ZIP_NAME}"
          ls -lh "$GITHUB_WORKSPACE/${ZIP_NAME}"

      # ─────────────────────────────────────────────
      # 8. UPLOAD ARTIFACT
      # ─────────────────────────────────────────────
      - name: Upload kernel ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockEquiv-OP9Pro-kernel
          path: StockEquiv-OP9Pro-*.zip
          retention-days: 30
          if-no-files-found: error
